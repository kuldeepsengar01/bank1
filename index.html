<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Bank Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="#">
            <i class="bi bi-bank2"></i> KS Bank
        </a>
    </div>
</nav>

<!-- Hero -->
<section class="hero text-center">
    <div class="container">
        <h1>Modern Banking System</h1>
        <p>Secure • Fast • Reliable Banking Experience</p>
    </div>
</section>

<div class="container my-5">

    <div class="row g-4">

        <!-- Account Form -->
        <div class="col-lg-4">
            <div class="card bank-card">
                <h3 class="text-center mb-4">Open Account</h3>

                <input type="hidden" id="editIndex">

                <input type="text" class="form-control mb-3"
                id="name" placeholder="Customer Name">

                <input type="number" class="form-control mb-3"
                id="balance" placeholder="Opening Balance">

                <button class="btn btn-primary w-100"
                onclick="saveAccount()">
                    Open Account
                </button>
            </div>
        </div>

        <!-- Deposit / Withdraw -->
        <div class="col-lg-4">
            <div class="card bank-card">
                <h3 class="text-center mb-4">Transaction</h3>

                <input type="number" class="form-control mb-3"
                id="accNo" placeholder="Account Number">

                <input type="number" class="form-control mb-3"
                id="amount" placeholder="Amount">

                <button class="btn btn-success w-100 mb-2"
                onclick="deposit()">
                    Deposit Money
                </button>

                <button class="btn btn-danger w-100"
                onclick="withdraw()">
                    Withdraw Money
                </button>
            </div>
        </div>

        <!-- Search -->
        <div class="col-lg-4">
            <div class="card bank-card">
                <h3 class="text-center mb-4">Search Account</h3>

                <input type="number" class="form-control mb-3"
                id="searchAcc" placeholder="Enter Account Number">

                <button class="btn btn-warning w-100"
                onclick="searchAccount()">
                    Search
                </button>

                <div id="searchResult" class="mt-3"></div>
            </div>
        </div>

    </div>

    <!-- Accounts Table -->
    <div class="card bank-card mt-5">
        <h3 class="text-center mb-4">Customer Accounts</h3>

        <div class="table-responsive">
            <table class="table table-hover text-center">
                <thead>
                    <tr>
                        <th>Account No</th>
                        <th>Name</th>
                        <th>Balance</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="tableBody"></tbody>

            </table>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
